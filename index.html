<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Surat Keterangan Digital - FIKes</title>
    <!-- Menghubungkan ke File CSS Eksternal -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts untuk font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="verification-card">
        <!-- Header Instansi -->
        <div class="card-header">
            <h2>Sistem Verifikasi Digital</h2>
            <h1>Fakultas Ilmu Kesehatan</h1>
            <p>Universitas Faletehan</p>
        </div>

        <!-- Konten Utama -->
        <div class="card-content">
            <!-- Loader Status -->
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
                <p>Mencocokkan tanda tangan digital...</p>
            </div>

            <!-- Tampilan Jika Dokumen VALID -->
            <div id="status-valid" class="status-container hidden">
                <div class="icon-badge valid-badge">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <span class="status-label">Dokumen Sah & Aktif</span>
                
                <!-- Detail Atribut Mahasiswa -->
                <div class="data-profile">
                    <div class="data-group">
                        <label>Nama Mahasiswa</label>
                        <span id="view-nama" class="font-bold text-dark"></span>
                    </div>
                    <div class="data-group">
                        <label>NIM</label>
                        <span id="view-nim" class="font-mono text-medium"></span>
                    </div>
                    <div class="data-group">
                        <label>Program Studi</label>
                        <span id="view-prodi" class="text-medium"></span>
                    </div>
                    
                    <div class="grid-2col">
                        <div class="data-group">
                            <label>Jenis Kelas</label>
                            <span id="view-kelas" class="text-medium"></span>
                        </div>
                        <div class="data-group">
                            <label>Status</label>
                            <span id="view-status" class="font-bold text-emerald"></span>
                        </div>
                    </div>
                    
                    <div class="divider"></div>
                    
                    <div class="grid-2col">
                        <div class="data-group">
                            <label>Nomor Surat</label>
                            <span id="view-nosurat" class="font-mono text-small"></span>
                        </div>
                        <div class="data-group">
                            <label>Tanggal Terbit</label>
                            <span id="view-tglsurat" class="text-small"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tampilan Jika Dokumen INVALID -->
            <div id="status-invalid" class="status-container hidden">
                <div class="icon-badge invalid-badge">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </div>
                <h3>Data Tidak Ditemukan</h3>
                <p class="error-text">QR Code atau ID Surat tidak valid, tidak diterbitkan oleh sistem resmi tata usaha FIKes.</p>
            </div>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            &copy; 2026 Tata Usaha FIKes Universitas Faletehan
        </div>
    </div>

    <!-- Menghubungkan ke File JavaScript Eksternal -->
    <script src="app.js"></script>
</body>
</html>
